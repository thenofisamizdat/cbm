server {
    listen 80;
    listen [::]:80;

    # Replace with your domain or server IP
    server_name cbmtransport.com www.cbmtransport.com;

    root /var/www/cbm;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression for fast loading
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Cache static assets (images, CSS, JS) for 30 days
    location ~* \.(jpg|jpeg|png|gif|ico|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Main location — serve files, fallback to 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404 page (optional — uses default Nginx 404 for now)
    error_page 404 /404.html;

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
